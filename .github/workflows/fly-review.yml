name: PR Preview Deploy

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: lhr
  APP_NAME: learn-my-favs-pr-${{ github.event.number }}

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy preview app
        if: github.event.action == 'closed'
        run: flyctl apps destroy ${{ env.APP_NAME }} --yes || true

      - name: Create and deploy preview app
        if: github.event.action != 'closed'
        run: |
          # Create app if it doesn't exist
          if ! flyctl status --app ${{ env.APP_NAME }} > /dev/null 2>&1; then
            echo "Creating app ${{ env.APP_NAME }}..."
            flyctl apps create ${{ env.APP_NAME }} --machines || flyctl apps create ${{ env.APP_NAME }} --org personal --machines
          fi

          # Attach postgres if not already attached
          flyctl postgres attach learn-my-favs-db --app ${{ env.APP_NAME }} --yes 2>/dev/null || echo "Postgres already attached."

          # Deploy
          echo "Deploying ${{ env.APP_NAME }}..."
          flyctl deploy --app ${{ env.APP_NAME }} --primary-region ${{ env.FLY_REGION }} --remote-only --ha=false

    environment:
      name: pr-${{ github.event.number }}
      url: https://${{ env.APP_NAME }}.fly.dev
